<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 100">
  <defs>
    <linearGradient id="tealGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#166a80;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0F4C5C;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff8c42;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E36414;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="1" dy="2" stdDeviation="1" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <g transform="translate(10, 10)" filter="url(#shadow)">
    <!-- Letter P -->
    <!-- Vertical left bar (Teal) -->
    <path fill="url(#tealGrad)" d="M0 0 L25 0 L25 80 L0 80 Z" />
    <!-- Top bar (Teal) -->
    <path fill="url(#tealGrad)" d="M25 0 L55 0 L55 25 L25 25 Z" />
    <!-- Curved/Block section (Orange) -->
    <path fill="url(#orangeGrad)" d="M25 25 L55 25 L55 55 L25 55 Z" />
    <!-- Center hole filler (Teal) -->
    <rect x="15" y="10" width="10" height="10" fill="#0c3b47" opacity="0.3" />
    
    <!-- Letter O (Hex/Gear shape) -->
    <g transform="translate(65, 0)">
       <!-- Hexagon segments -->
       <path fill="url(#tealGrad)" d="M15 0 L45 0 L60 25 L45 50 L15 50 L0 25 Z" />
       <!-- Orange centerpiece -->
       <circle cx="30" cy="25" r="12" fill="url(#orangeGrad)" />
       <!-- Inner cut -->
       <circle cx="30" cy="25" r="6" fill="#0F4C5C" />
    </g>
  </g>
</svg>
